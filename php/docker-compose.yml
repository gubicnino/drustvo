# Lokalno testno okolje (MySQL + phpMyAdmin) za razvoj.
#   docker compose up -d         # zaženi
#   docker compose down          # ustavi (podatki ostanejo)
#   docker compose down -v       # ustavi + IZBRIŠI podatke (ponoven uvoz sheme)
#
# schema.sql se SAMODEJNO uvozi ob PRVEM zagonu (prazna baza).

services:
  db:
    image: mysql:8.4
    container_name: drustvo-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: drustvo
      MYSQL_USER: drustvo
      MYSQL_PASSWORD: drustvo
    ports:
      - "3306:3306"            # če je 3306 zaseden, spremeni v "3307:3306" in nastavi DB_PORT=3307
    volumes:
      - drustvo_db:/var/lib/mysql
      # Samodejni uvoz tabel + začetnih podatkov ob prvem zagonu:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5
    container_name: drustvo-pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      UPLOAD_LIMIT: 20M
    ports:
      - "8080:80"             # http://localhost:8080  (uporabnik: root / geslo: root)
    depends_on:
      - db

volumes:
  drustvo_db:
